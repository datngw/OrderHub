services:
  orderhub-db:
    image: postgres:16-alpine
    container_name: orderhub-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - orderhub-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  orderhub-pgadmin:
    image: dpage/pgadmin4:latest
    container_name: orderhub-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      orderhub-db:
        condition: service_healthy

  orderhub-api:
    build:
      context: .
      dockerfile: src/OrderHub.Api/Dockerfile
    container_name: orderhub-api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=orderhub-db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Pooling=true;MinPoolSize=5;MaxPoolSize=100
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=OrderHub
      - Jwt__Audience=OrderHub
      - Jwt__AccessTokenMinutes=15
      - Jwt__RefreshTokenDays=7
    depends_on:
      orderhub-db:
        condition: service_healthy

  orderhub-seq:
    image: datalust/seq:latest
    container_name: orderhub-seq
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_ADMINPASSWORD=${SEQ_ADMIN_PASSWORD:-admin}
    ports:
      - "5341:5341"
      - "8081:80"
    volumes:
      - seq-data:/data

volumes:
  orderhub-db-data:
  seq-data:
